<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Vídeos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">📹 Lista de Vídeos</h1>
        <div class="row mb-3">
            <div class="col-md-3"><input type="text" id="search" class="form-control" placeholder="Buscar..."></div>
            <div class="col-md-3"><input type="text" id="setor" class="form-control" placeholder="Setor"></div>
            <div class="col-md-3"><input type="text" id="categoria" class="form-control" placeholder="Categoria"></div>
            <div class="col-md-3 d-grid"><button class="btn btn-primary" onclick="carregarVideos()">Filtrar</button>
            </div>
        </div>

        <div class="row" id="lista-videos"></div>
    </div>

    <!-- Modal Editar -->
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Vídeo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-id">
                    <input type="text" class="form-control mb-2" id="edit-titulo" placeholder="Título">
                    <input type="text" class="form-control mb-2" id="edit-descricao" placeholder="Descrição">
                    <input type="text" class="form-control mb-2" id="edit-setor" placeholder="Setor">
                    <input type="text" class="form-control mb-2" id="edit-categoria" placeholder="Categoria">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Remover -->
    <div class="modal fade" id="modalRemover" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar Remoção</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Tem certeza que deseja remover este vídeo?</p>
                    <input type="hidden" id="delete-id">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-danger" onclick="removerVideo()">Remover</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
