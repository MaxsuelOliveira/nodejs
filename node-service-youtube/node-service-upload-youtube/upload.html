<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Vídeo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">📤 Enviar Novo Vídeo</h1>

        <form id="uploadForm">

            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" class="form-control" name="titulo" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea class="form-control" name="descricao" required></textarea>
            </div>

            <div class="mb-3">
                <label for="file" class="form-label">
                    Setor
                    <span class="text-danger">*</span>
                </label>
                <select id="setorSelect" class="form-select" name="setor" placeholder="Setor" required>
                    <option selected hidden>Selecionar Setor</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="file" class="form-label">
                    Categoria
                    <span class="text-danger">*</span>
                </label>
                <select id="categoriaSelect" class="form-select" aria-label="" required>
                    <option selected hidden value="">Selecionar Categoria</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Arquivo de Vídeo</label>
                <input type="file" class="form-control" name="video" accept="video/*" required>
            </div>

            <button type="submit" class="btn btn-success">Enviar</button>

        </form>
        <div class="mt-3" id="resultado"></div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/upload.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
